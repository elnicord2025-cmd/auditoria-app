<!DOCTYPE html>
<html>
<head>
    <title>Calificación Auditoría TI</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .box {
            background: #111827;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            border-radius: 10px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
            width: 90%;
        }

        .green { color: #22c55e; }
        .orange { color: orange; }
        .yellow { color: yellow; }
        .red { color: red; }
    </style>
</head>
<body>

<h1>Calificación Auditoría TI</h1>

<div class="box">
<form method="POST">

<input name="auditoria" placeholder="Nombre auditoría" required>
<input type="number" name="procedimientos" id="proc" placeholder="Cantidad procedimientos" required>

<button type="button" onclick="generar()">Generar</button>

<div id="inputs"></div>

<button type="submit">Calcular</button>

</form>
</div>

{% if resultado %}
<div class="box">
    <h2>Resultado</h2>
    <p>Auditoría: {{ resultado.auditoria }}</p>
    <p>Promedio: {{ resultado.promedio }}</p>
    <p class="{{ resultado.color }}">Nivel: {{ resultado.nivel }}</p>
</div>
{% endif %}

<script>
function generar(){
    const n = document.getElementById("proc").value;
    let html = "";

    for(let i=1; i<=n; i++){
        html += `<input type="number" name="proc${i}" min="0" max="4" placeholder="Procedimiento ${i}" required>`;
    }

    html += `<input type="number" name="calidad" min="0" max="4" placeholder="Calidad información" required>`;
    html += `<input type="number" name="entrega" min="0" max="4" placeholder="Entrega oportuna" required>`;

    document.getElementById("inputs").innerHTML = html;
}
</script>

</body>
</html>
