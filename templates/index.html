<!DOCTYPE html>
<html>
<head>
    <title>Calculadora de Auditoría</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #22c55e;
            text-align: center;
        }

        .box {
            background: #111827;
            padding: 20px;
            margin: 30px auto;
            width: 400px;
            border-radius: 10px;
        }

        input, select, button {
            padding: 10px;
            margin: 5px;
            width: 90%;
        }

        button {
            background: #22c55e;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        canvas {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>

<body>

<h1>GAS - Calculadora de Auditoría</h1>

<div class="box">
    <form method="POST">

        <input type="text" name="auditoria" placeholder="Nombre de auditoría" required>

        <select name="tipo" onchange="toggleCampos()">
            <option value="numero">Buscar por número</option>
            <option value="texto">Buscar por texto</option>
        </select>

        <input type="number" id="numero" name="numero" placeholder="Número (1-64)" oninput="autocompletar()">

        <input type="text" id="texto" name="texto" placeholder="Descripción aproximada">

        <button type="submit">Calcular</button>

    </form>
</div>

{% if resultado %}
<div class="box">
    <h2>Resultado</h2>

    <p><b>Auditoría:</b> {{ resultado.auditoria }}</p>
    <p><b>Paso:</b> {{ resultado.paso }}</p>
    <p><b>Descripción:</b> {{ resultado.descripcion }}</p>

    <!-- Barra -->
    <div style="background: #374151; border-radius: 10px; height: 25px;">
        <div style="
            background: linear-gradient(90deg, #22c55e, #4ade80);
            width: {{ resultado.avance }}%;
            height: 100%;
            text-align: center;
            color: black;
            font-weight: bold;">
            {{ resultado.avance }}%
        </div>
    </div>

    <p><b>Fecha:</b> {{ resultado.fecha }}</p>

    <canvas id="grafico"></canvas>
</div>
{% endif %}

<!-- GRAFICO -->
{% if resultado %}
<script>
const ctx = document.getElementById('grafico').getContext('2d');
const avance = {{ resultado.avance }};

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Avance', 'Pendiente'],
        datasets: [{
            data: [avance, 100 - avance],
            backgroundColor: ['#22c55e', '#374151']
        }]
    },
    options: {
        cutout: '70%'
    }
});
</script>
{% endif %}

<!-- PASOS -->
<script>
const pasos = {
1: "Elegir la auditoria por el plan anual de auditorias",
2: "Elegir equipo de la auditoria",
3: "Crear grupo en teams de la auditoria",
4: "Enviar informes de antecedentes",
5: "Verificar incidentes abiertas o en seguimiento TeamMate",
6: "Crear proyecto en teamMate para asignar horas",
7: "Definir objetivos de la auditoria",
8: "Definir alcance de la auditoria",
9: "Socializar alcance y objetivos",
10: "Crear carta auditoria con alcance y objetivos",
11: "Solicitar reunion de kickoff - inicio de la auditoria",
12: "Preparar presentacion del kickoff - inicio de la auditoria",
13: "Socializar presentacion de kickoff",
14: "Gerente de auditoria envia carta de inicio de la auditoria",
15: "Preparar requerimientos para enviar al area",
16: "Envio de requerimientos a las areas de la auditoria",
17: "En espera de recepcion de requerimientos",
18: "Parcialmente recibidos los requerimientos",
19: "Respuesta inicial de requerimientos",
20: "Verificando pendientes",
21: "Revisión de evidencias",
22: "Organización de evidencias",
23: "Entrevistas",
24: "Evaluación controles",
25: "Pruebas de control",
26: "Análisis resultados",
27: "Solicitud de evidencias adicionales",
28: "Recepción de evidencias",
29: "Registro de hallazgos",
30: "Validación hallazgos",
31: "Borradores",
32: "Revisión interna",
33: "Socialización evidencias",
34: "En espera evidencias",
35: "Documentando incidencias",
36: "Parcialmente documentadas",
37: "Enviada para aprobación gerente",
38: "Enviada para aprobación director",
39: "Socialización interna",
40: "Formato estándar",
41: "Reunión con área",
42: "Cambios formularios",
43: "Actualización documento",
44: "Envío formularios",
45: "En espera planes",
46: "Verificación planes",
47: "Calificación riesgo",
48: "Presentación cierre",
49: "Actualización post cierre",
50: "En espera cambios",
51: "Comité auditoría",
52: "Actualización comité",
53: "Carga en TeamMate",
54: "Documentación",
55: "Parcialmente documentado",
56: "Informe borrador",
57: "Encuestas",
58: "En espera encuestas",
59: "Documento QA",
60: "Completar documentación",
61: "Carga incidencias",
62: "Auditoría abierta",
63: "Seguimiento abierto",
64: "Auditoría completada"
};

function autocompletar() {
    const num = document.getElementById("numero").value;
    const texto = document.getElementById("texto");

    if (pasos[num]) {
        texto.value = pasos[num];
    } else {
        texto.value = "";
    }
}

function toggleCampos() {
    const tipo = document.querySelector("select[name='tipo']").value;
    const numero = document.getElementById("numero");
    const texto = document.getElementById("texto");

    if (tipo === "numero") {
        numero.disabled = false;
        texto.disabled = true;
    } else {
        numero.disabled = true;
        texto.disabled = false;
    }
}

// ejecutar al cargar
toggleCampos();
</script>

</body>
</html>
