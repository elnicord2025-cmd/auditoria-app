<!DOCTYPE html>
<html>
<head>
    <title>Calculadora de Auditoría</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #22c55e;
            text-align: center;
        }

        .box {
            background: #111827;
            padding: 20px;
            margin: 30px auto;
            width: 400px;
            border-radius: 10px;
        }

        input, select, button {
            padding: 10px;
            margin: 5px;
            width: 90%;
        }

        button {
            background: #22c55e;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        canvas {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>

<body>

<h1>GAS - Calculadora de Auditoría</h1>

<div class="box">
    <form method="POST">

        <input type="text" name="auditoria" placeholder="Nombre de auditoría" required>

        <select name="tipo">
            <option value="numero">Buscar por número</option>
            <option value="texto">Buscar por texto</option>
        </select>

        <input type="number" id="numero" name="numero" placeholder="Número (1-64)" oninput="autocompletar()">

        <input type="text" id="texto" name="texto" placeholder="Descripción aproximada">

        <button type="submit">Calcular</button>

    </form>
</div>

{% if resultado %}
<div class="box">
    <h2>Resultado</h2>

    <p><b>Auditoría:</b> {{ resultado.auditoria }}</p>
    <p><b>Paso:</b> {{ resultado.paso }}</p>
    <p><b>Descripción:</b> {{ resultado.descripcion }}</p>

    <!-- Barra de progreso -->
    <div style="background: #374151; border-radius: 10px; width: 100%; height: 25px; overflow: hidden;">
        <div style="
            background: linear-gradient(90deg, #22c55e, #4ade80);
            width: {{ resultado.avance }}%;
            height: 100%;
            border-radius: 10px;
            text-align: center;
            color: black;
            font-weight: bold;
            transition: width 0.5s;">
            {{ resultado.avance }}%
        </div>
    </div>

    <p><b>Fecha:</b> {{ resultado.fecha }}</p>

    <!-- Gráfico -->
    <canvas id="grafico" width="300" height="300"></canvas>
</div>

<!-- PASOS COMPLETOS -->

function autocompletar() {
    const num = document.getElementById("numero").value;
    const texto = document.getElementById("texto");

    if (pasos[num]) {
        texto.value = pasos[num];
    } else {
        texto.value = "";
    }
}
</script>

</body>
</html>
